services:
  # PostgreSQL Database
  - type: pgo
    name: assetflow-db
    plan: free

  # NestJS Backend Web Service
  - type: web
    name: assetflow-backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run prisma:migrate:prod && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assetflow-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 3000
